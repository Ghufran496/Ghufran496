# ════════════════════════════════════════════════════════════════════
#   PROFILE-3D.YML — Generates the 3D contribution calendar SVGs.
#   The action commits the generated files directly to the `main`
#   branch under: profile-3d-contrib/*.svg
#
#   Default outputs include:
#     profile-3d-contrib/profile-night-view.svg
#     profile-3d-contrib/profile-night-rainbow.svg   <-- used in README
#     profile-3d-contrib/profile-night-green.svg
#     profile-3d-contrib/profile-season.svg
#     profile-3d-contrib/profile-gitblock.svg
# ════════════════════════════════════════════════════════════════════

name: generate-3d-contrib

on:
  # Daily at 18:00 UTC
  schedule:
    - cron: "0 18 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
  # Run on push to main so first generation happens immediately
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: generate-github-profile-3d-contrib

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate the 3D contribution SVGs
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit and push the generated SVGs to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(3d-contrib): refresh profile contribution SVGs"
            git push
          fi
