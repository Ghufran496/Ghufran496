# ════════════════════════════════════════════════════════════════════
#   SNAKE.YML — Generates the contribution-snake animation SVGs.
#   Output is pushed to the `output` branch of THIS repo so the README
#   can reference them at:
#     raw.githubusercontent.com/<user>/<repo>/output/github-contribution-grid-snake.svg
#     raw.githubusercontent.com/<user>/<repo>/output/github-contribution-grid-snake-dark.svg
# ════════════════════════════════════════════════════════════════════

name: generate-snake

on:
  # Run automatically every 24 hours
  schedule:
    - cron: "0 0 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
  # Also run on every push to main so first run happens immediately
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate the contribution-snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00F0FF&color_dots=#161B22,#1F6FEB,#8B5CF6,#FF006E,#00F0FF

      - name: Push the generated SVGs to the `output` branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
